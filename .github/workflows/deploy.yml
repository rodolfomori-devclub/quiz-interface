name: Deploy to AWS S3

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to S3
        # cp --recursive exige apenas s3:PutObject (sync --delete exigiria
        # s3:ListBucket/DeleteObject, ausentes na policy do usuario github-deploy).
        run: aws s3 cp ./dist s3://quiz-devclub --recursive

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id E3U5CPN5AWQIHT --paths '/*'
